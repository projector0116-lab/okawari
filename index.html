<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給食おかわり名簿登録システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>
    <!-- jsQR (QRコード読み取りライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        /* 座席表アコーディオン（開閉）のスムーズなアニメーション */
        #main-seating-wrapper {
            transition: max-height 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }

        /* フェーズ2: 名前やお席番号（スライド＆フェードイン） */
        .seat-content {
            transform: translateY(16px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }

        /* 親要素に.is-activeがついた時、各マスの中身を順番に出現させる */
        .is-active .seat-content {
            transform: translateY(0);
            opacity: 1;
        }

        /* フェーズ3: 右上の緑色カードマーク（バウンドポップイン） */
        .card-badge {
            transform: scale(0);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.7, 0.64, 1), opacity 0.4s ease;
        }

        /* アクティブ時に飛び出すように表示 */
        .is-active .card-badge {
            transform: scale(1);
            opacity: 1;
        }

        /* 机のベース（枠線）自体のなめらかな背景色変化 */
        .seat-button {
            transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col pb-12">

    <!-- ヘッダー -->
    <header id="app-header" class="bg-slate-800 text-white p-4 md:p-6 sticky top-0 z-10 flex justify-between items-center shadow-md w-full">
        <div class="flex items-center space-x-2 max-w-2xl w-full mx-auto">
            <i class="fa-solid fa-address-book text-xl md:text-2xl text-slate-300"></i>
            <div>
                <h1 class="text-lg md:text-2xl font-bold tracking-wider">優先券・座席紐付け</h1>
                <p class="text-[9px] md:text-xs text-slate-400">QRコードを読み取って座席と紐付けます</p>
            </div>
        </div>
        <span class="text-xs bg-slate-700 px-3 py-1.5 rounded-full font-bold border border-slate-600 flex items-center">
            1年3組
        </span>
    </header>

    <main class="p-4 md:p-6 space-y-6 flex-grow max-w-4xl w-full mx-auto">

        <!-- カメラ映像表示エリア (正方形・Safariバグ完全回避レイアウト) -->
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-square w-full max-w-xs mx-auto flex items-center justify-center border border-gray-200 shadow-md">
            <video id="scanner-video" class="w-full h-full object-cover" playsinline autoplay muted></video>
            <div id="scan-frame" class="absolute inset-0 border-4 border-emerald-500 m-10 rounded-lg pointer-events-none opacity-80 animate-pulse"></div>
            
            <!-- カメラ起動中・自動復旧中オーバーレイ表示 -->
            <div id="camera-loading" class="absolute inset-0 bg-black flex flex-col items-center justify-center text-white p-4 transition-opacity duration-300">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-emerald-400"></i>
                <p id="loading-text" class="text-sm font-bold">カメラを起動しています...</p>
            </div>
        </div>

        <!-- カメラ再起動 ＆ 手動入力エリア -->
        <div class="w-full space-y-4">
            <!-- オシャレなカプセル型再起動ボタン -->
            <div class="text-center">
                <button onclick="restartCamera()" class="inline-flex items-center space-x-2.5 py-2.5 px-6 rounded-full bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-200 text-emerald-700 font-extrabold text-xs tracking-wider shadow-sm hover:shadow-md hover:from-emerald-100 hover:to-teal-100 active:scale-95 transition-all duration-200 select-none">
                    <i class="fa-solid fa-arrows-rotate text-emerald-600"></i>
                    <span>カメラを再起動する</span>
                </button>
            </div>

            <!-- 手動番号入力欄 -->
            <div class="bg-white border border-slate-200 p-3 rounded-xl shadow-sm space-y-1.5 max-w-xs mx-auto">
                <label class="block text-[10px] font-bold text-slate-500 text-center"><i class="fa-solid fa-keyboard mr-1"></i> 優先券の番号を手動入力</label>
                <div class="flex space-x-2">
                    <input type="text" id="manual-number-input" onkeydown="if(event.key === 'Enter') submitManualNumber()" placeholder="例：105" class="flex-grow border border-gray-300 rounded-lg p-2 text-xs text-center outline-none focus:ring-1 focus:ring-emerald-500">
                    <button onclick="submitManualNumber()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold px-4 py-2 rounded-lg text-xs transition-colors shadow-sm">
                        登録
                    </button>
                </div>
            </div>
        </div>

        <!-- アニメーション付きメイン座席表開閉ボタン -->
        <div class="text-center max-w-md mx-auto w-full pt-2">
            <button onclick="toggleMainSeatingChart()" id="toggle-seating-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-sm flex items-center justify-center space-x-2">
                <i id="toggle-seating-icon" class="fa-solid fa-circle-chevron-down"></i>
                <span id="toggle-seating-text">座席表を表示する</span>
            </button>
        </div>

        <!-- 3. 教室座席表 -->
        <div id="seating-section" class="space-y-4 w-full pt-4">
            <div id="main-seating-wrapper" class="hidden overflow-hidden max-h-0 opacity-0 space-y-4">
                
                <!-- 案内バナー (座席表の真上) -->
                <div id="pending-banner" class="hidden bg-amber-50 border border-amber-200 p-3.5 rounded-2xl text-center text-xs font-bold text-amber-800 animate-pulse flex justify-between items-center w-full shadow-sm">
                    <span>
                        <i class="fa-solid fa-circle-info mr-1"></i> 優先券 <strong id="pending-qr-label" class="underline text-sm text-red-600"></strong> を登録します。座席表から割り当てる生徒の席を押してください。
                    </span>
                    <button onclick="cancelPendingRegistration()" class="text-red-600 hover:text-red-800 border border-red-200 bg-white rounded-lg px-3 py-1 text-[11px] font-bold transition-all ml-2">キャンセル</button>
                </div>

                <h2 class="text-[10px] font-bold text-slate-400 text-center">ロッカー側 (後方)</h2>

                <!-- A4用紙と同じレイアウト -->
                <div class="grid grid-cols-3 gap-3 md:gap-4 w-full">
                    <div id="block-left" class="grid grid-cols-2 gap-2 border-r pr-1.5 md:pr-2 border-slate-200"></div>
                    <div id="block-middle" class="grid grid-cols-2 gap-2 border-r pr-1.5 md:pr-2 border-slate-200"></div>
                    <div id="block-right" class="grid grid-cols-2 gap-2"></div>
                </div>

                <!-- 黒板表示板 -->
                <div class="bg-emerald-800 border-2 border-emerald-950 text-white font-bold py-2 rounded-xl text-center text-sm tracking-widest w-full shadow flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-chalkboard"></i>
                    <span>黒 板</span>
                </div>
            </div>
        </div>

        <!-- コントロールボタン -->
        <div class="w-full pt-4 border-t flex justify-end items-center text-xs">
            <button onclick="clearTicketLinks()" class="text-red-500 font-bold hover:text-red-700 flex items-center space-x-1">
                <i class="fa-solid fa-unlink"></i><span>すべての優先券の紐付け（登録）を解除する</span>
            </button>
        </div>
    </main>

    <!-- 【中央ポップアップ】紐付け確認＆解除モーダル -->
    <div id="student-detail-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div id="student-detail-card" class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl text-center transform scale-95 transition-all duration-200">
            <h3 class="text-lg font-bold text-slate-800 flex items-center border-b pb-2"><i class="fa-solid fa-id-card text-slate-700 mr-2"></i>登録情報の確認</h3>
            
            <div class="bg-slate-50 p-4 rounded-xl space-y-2 border border-slate-100 text-left text-xs">
                <div class="flex justify-between">
                    <span class="text-slate-400">優先券番号:</span>
                    <strong id="detail-qr-num" class="text-slate-800 font-mono text-base"></strong>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">出席番号:</span>
                    <strong id="detail-snum" class="text-slate-800"></strong>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">座席位置:</span>
                    <strong id="detail-seat" class="text-slate-800"></strong>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">お名前:</span>
                    <strong id="detail-name" class="text-slate-800 text-base"></strong>
                </div>
            </div>

            <div class="flex space-x-3 pt-2 border-t">
                <button onclick="deleteTicketLinkFromDetail()" class="flex-1 bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2.5 rounded-xl text-xs transition-colors">
                    紐付けを解除
                </button>
                <button onclick="closeStudentDetailModal()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-xs transition-colors">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <!-- 紐付け確定の確認モーダル -->
    <div id="admin-confirm-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl text-center">
            <h3 class="text-lg font-bold text-gray-800 flex items-center border-b pb-2"><i class="fa-solid fa-link text-slate-700 mr-2"></i>優先券の登録確認</h3>
            
            <div class="bg-slate-50 p-4 rounded-xl space-y-2 border border-slate-100 text-left text-xs">
                <div class="flex justify-between">
                    <span class="text-slate-400">登録する優先券:</span>
                    <strong id="confirm-ticket-num" class="text-emerald-600 font-mono text-sm"></strong>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">生徒名:</span>
                    <strong id="confirm-student-name" class="text-slate-800 text-sm"></strong>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">座席位置:</span>
                    <strong id="confirm-seat-label" class="text-slate-800"></strong>
                </div>
            </div>

            <p class="text-[10px] text-gray-400">この生徒に優先券を登録します。よろしいですか？</p>

            <div class="flex space-x-3 pt-2">
                <button onclick="cancelConfirmModal()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2 rounded-xl text-xs">キャンセル</button>
                <button onclick="submitTicketLink()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-xs shadow-md">登録する</button>
            </div>
        </div>
    </div>

    <script>
        const classroomRoster = {
            "1-3": { sNum: "17", name: "鍋本 美歩" },
            "1-4": { sNum: "24", name: "森 晴彌" },
            "2-1": { sNum: "18", name: "古岡 大空" },
            "2-2": { sNum: "1", name: "東 美宙" },
            "2-3": { sNum: "32", name: "劉 軒征" },
            "2-4": { sNum: "20", name: "松村 紗良" },
            "2-5": { sNum: "11", name: "坂口 壮太" },
            "2-6": { sNum: "3", name: "岩月 杏奈" }, 
            "3-1": { sNum: "29", name: "山本 葵" },
            "3-2": { sNum: "8", name: "河野 匠真" },
            "3-3": { sNum: "5", name: "大和 颯花" },
            "3-4": { sNum: "22", name: "三輪 亮太" },
            "3-5": { sNum: "6", name: "海津 充葉" },
            "3-6": { sNum: "13", name: "高橋 魁浬" },
            "4-1": { sNum: "10", name: "児玉 璃恩" },
            "4-2": { sNum: "23", name: "森 花那" },
            "4-3": { sNum: "31", name: "横田 岳" },
            "4-4": { sNum: "16", name: "中村 咲彩" },
            "4-5": { sNum: "25", name: "安井 新" },
            "4-6": { sNum: "21", name: "三原 知佳" },
            "5-1": { sNum: "14", name: "竹上 来瞳" },
            "5-2": { sNum: "27", name: "矢田 崚雅" },
            "5-3": { sNum: "15", name: "栃川 優梨" },
            "5-4": { sNum: "19", name: "松原 彪牙" },
            "5-5": { sNum: "12", name: "杉山 知穂" },
            "5-6": { sNum: "26", name: "安江 稀音" },
            "6-1": { sNum: "28", name: "山田 基貴" },
            "6-2": { sNum: "9", name: "河野 莉子" },
            "6-3": { sNum: "7", name: "垣野晏司朗" },
            "6-4": { sNum: "30", name: "山本いつ菜" }, 
            "6-5": { sNum: "2", name: "伊藤 勇翔" },
            "6-6": { sNum: "4", name: "大沼結希乃" }
        };

        let videoStream = null;
        let animationFrameId = null;
        let isScanningPaused = false;
        
        let activeQrNum = null; 
        let pendingQrNum = null; 
        let tempTargetRow = null; 
        let tempTargetCol = null;

        let isSeatingChartVisible = false;

        let studentDb = JSON.parse(localStorage.getItem('student_db')) || {};

        // カメラ自動復旧ウォッチドッグ用の状態変数
        let lastVideoTime = -1;
        let lastVideoTimeUpdateTime = Date.now();
        let isRecovering = false;

        window.onload = function() {
            startCamera();
            renderSeatingChart();
            
            // フリーズ自動検知システムを起動
            setInterval(checkCameraFreeze, 1000);
        };

        // メイン座席表の表示切り替え（アコーディオン）
        function toggleMainSeatingChart() {
            const wrapper = document.getElementById('main-seating-wrapper');
            const text = document.getElementById('toggle-seating-text');
            const icon = document.getElementById('toggle-seating-icon');
            
            isSeatingChartVisible = !isSeatingChartVisible;
            
            if (isSeatingChartVisible) {
                renderSeatingChart(); // 最新データを再読み込みして描画
                wrapper.classList.remove('hidden');
                
                // 1. まず座席全体の枠を表示（高さを広げる）
                setTimeout(() => {
                    wrapper.style.maxHeight = '1500px';
                    wrapper.style.opacity = '1';
                }, 10);
                
                // 2. 少し遅れて.is-activeクラスを付与し、下からの名前ウェーブとカードマークを出現させる
                setTimeout(() => {
                    wrapper.classList.add('is-active');
                }, 150);

                text.innerText = "座席表を非表示にする";
                icon.className = "fa-solid fa-circle-chevron-up";
            } else {
                // 閉じる時はアニメーションクラスを外し、高さを閉じる
                wrapper.classList.remove('is-active');
                wrapper.style.maxHeight = '0px';
                wrapper.style.opacity = '0';
                
                setTimeout(() => {
                    if (!isSeatingChartVisible) {
                        wrapper.classList.add('hidden');
                    }
                }, 500);

                text.innerText = "座席表を表示する";
                icon.className = "fa-solid fa-circle-chevron-down";
            }
        }

        // スキャン時などに裏側から自動で座席表を展開する関数
        function forceShowSeatingChart() {
            if (!isSeatingChartVisible) {
                toggleMainSeatingChart();
            }
        }

        function renderSeatingChart() {
            renderBlock('block-left', [1, 2]);
            renderBlock('block-middle', [3, 4]);
            renderBlock('block-right', [5, 6]);
        }

        function renderBlock(elementId, cols) {
            const blockEl = document.getElementById(elementId);
            blockEl.innerHTML = '';
            for (let row = 1; row <= 6; row++) {
                cols.forEach(col => {
                    blockEl.appendChild(createSeatElement(row, col));
                });
            }
        }

        // マス目の動的生成（3段階ウェーブアニメーション対応）
        function createSeatElement(row, col) {
            const rosterStudent = classroomRoster[`${row}-${col}`];
            const btn = document.createElement('button');
            btn.className = "seat-button w-full aspect-[2/1] rounded-lg border text-center text-xs shadow-sm flex flex-col justify-center items-center p-1 overflow-hidden relative box-border ";

            // ★ 下から上へ順番にアニメーションをズラす遅延時間の計算
            const nameDelay = (6 - row) * 120 + 100;
            // 優先券カードマークは、名前が出たあとにポンと出てくるようにディレイを加算
            const badgeDelay = nameDelay + 350;

            if (rosterStudent) {
                const linkedTicketEntry = Object.entries(studentDb).find(([ticketNum, data]) => data.row === row && data.col === col);

                if (linkedTicketEntry) {
                    const [ticketNum, s] = linkedTicketEntry;
                    btn.classList.add("bg-emerald-50", "border-emerald-300", "hover:bg-emerald-100");
                    btn.innerHTML = `
                        <!-- 第3段階：右上の緑色カードマーク (バウンドディレイ適用) -->
                        <span class="card-badge absolute top-1 right-1 text-emerald-500 text-[10px] leading-none" style="transition-delay: ${badgeDelay}ms;">
                            <i class="fa-solid fa-address-card"></i>
                        </span>
                        
                        <!-- 第2段階：出席番号・優先券・お名前 (ウェーブディレイ適用) -->
                        <div class="seat-content w-full flex flex-col items-center" style="transition-delay: ${nameDelay}ms;">
                            <span class="text-[7px] text-emerald-600 font-mono font-bold leading-none">No.${rosterStudent.sNum} / 券:${ticketNum}</span>
                            <span class="font-extrabold text-[11px] md:text-sm tracking-wide mt-0.5 truncate max-w-full text-emerald-950">${rosterStudent.name}</span>
                        </div>
                    `;
                    btn.onclick = () => showStudentInfo(ticketNum);
                } else {
                    btn.classList.add("bg-white", "border-slate-200", "hover:bg-slate-50");
                    btn.innerHTML = `
                        <!-- 第2段階：出席番号とお名前 -->
                        <div class="seat-content w-full flex flex-col items-center" style="transition-delay: ${nameDelay}ms;">
                            <span class="text-[8px] text-slate-400 font-mono leading-none">No.${rosterStudent.sNum}</span>
                            <span class="font-bold text-[11px] md:text-sm tracking-wide mt-0.5 truncate max-w-full text-slate-800">${rosterStudent.name}</span>
                        </div>
                    `;
                    btn.onclick = () => handleRosterSeatClick(row, col, rosterStudent);
                }
            } else {
                btn.classList.add("bg-slate-50/50", "border-dashed", "border-slate-100", "text-slate-300", "pointer-events-none");
                btn.innerHTML = `
                    <div class="seat-content w-full flex flex-col items-center" style="transition-delay: ${nameDelay}ms;">
                        <span class="text-[9px] font-bold text-slate-200">通路</span>
                    </div>
                `;
            }
            return btn;
        }

        function handleRosterSeatClick(row, col, studentInfo) {
            if (pendingQrNum) {
                tempTargetRow = row;
                tempTargetCol = col;
                openConfirmModal(pendingQrNum, studentInfo.name, row, col);
            } else {
                const ticketNum = prompt(`「No.${studentInfo.sNum} ${studentInfo.name}」さんに手動で紐付ける優先券の番号を入力してください：`);
                if (ticketNum && ticketNum.trim() !== "") {
                    const cleanedNum = ticketNum.trim();
                    if (studentDb[cleanedNum]) {
                        alert(`その優先券番号（No.${cleanedNum}）はすでに別の生徒に登録されています。`);
                        return;
                    }
                    studentDb[cleanedNum] = {
                        row: row,
                        col: col,
                        name: studentInfo.name,
                        sNum: studentInfo.sNum
                    };
                    localStorage.setItem('student_db', JSON.stringify(studentDb));
                    renderSeatingChart();
                }
            }
        }

        function handleScannedData(scannedData) {
            isScanningPaused = true;
            if (navigator.vibrate) { navigator.vibrate(200); }
            
            let qrNum = scannedData.trim();
            try {
                const url = new URL(scannedData);
                qrNum = url.searchParams.get('id') || url.searchParams.get('get') || scannedData.trim();
            } catch (e) {}

            const linkedStudent = studentDb[qrNum];

            if (linkedStudent) {
                showStudentInfo(qrNum);
            } else {
                pendingQrNum = qrNum;
                document.getElementById('pending-qr-label').innerText = qrNum;
                document.getElementById('pending-banner').classList.remove('hidden');
                
                // ★【改善】スキャンした際、座席表が閉じられていたら自動で展開アニメーションを実行
                forceShowSeatingChart();

                // 展開完了時のサイズ変化にあわせて位置調整するため、少し時間差を置いてスクロール
                setTimeout(() => {
                    document.getElementById('seating-section').scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'start' 
                    });
                }, 350);

                forceVideoPlay();
            }
        }

        function showStudentInfo(ticketNum) {
            const data = studentDb[ticketNum];
            if (!data) return;

            activeQrNum = ticketNum;
            document.getElementById('detail-qr-num').innerText = "No. " + ticketNum;
            document.getElementById('detail-snum').innerText = "No. " + data.sNum;
            
            const displayRow = 7 - data.row;
            document.getElementById('detail-seat').innerText = `${data.col}列目 - 前から${displayRow}行目`;
            document.getElementById('detail-name').innerText = data.name + " さん";

            const modal = document.getElementById('student-detail-modal');
            const card = document.getElementById('student-detail-card');
            modal.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-95'), 10);
            
            document.getElementById('scan-frame').className = "absolute inset-0 border-4 border-slate-500 m-10 rounded-lg pointer-events-none opacity-80 animate-pulse";
        }

        function closeStudentDetailModal() {
            document.getElementById('student-detail-modal').classList.add('hidden');
            document.getElementById('student-detail-card').classList.add('scale-95');
            document.getElementById('scan-frame').className = "absolute inset-0 border-4 border-emerald-500 m-10 rounded-lg pointer-events-none opacity-80 animate-pulse";
            isScanningPaused = false;
            forceVideoPlay();
        }

        function deleteTicketLinkFromDetail() {
            if (confirm("本当にこの優先券の紐付け登録を解除しますか？\n（生徒の名前は消えず、席が未登録の白に戻ります）")) {
                delete studentDb[activeQrNum];
                localStorage.setItem('student_db', JSON.stringify(studentDb));
                renderSeatingChart();
                closeStudentDetailModal();
            }
        }

        function openConfirmModal(ticketNum, studentName, row, col) {
            document.getElementById('confirm-ticket-num').innerText = "No. " + ticketNum;
            document.getElementById('confirm-student-name').innerText = studentName + " さん";
            
            const displayRow = 7 - row;
            document.getElementById('confirm-seat-label').innerText = `${col}列目 - 前から${displayRow}行目`;

            document.getElementById('admin-confirm-modal').classList.remove('hidden');
        }

        function cancelConfirmModal() {
            document.getElementById('admin-confirm-modal').classList.add('hidden');
            isScanningPaused = false;
            forceVideoPlay();
        }

        function submitTicketLink() {
            const rosterStudent = classroomRoster[`${tempTargetRow}-${tempTargetCol}`];
            if (!rosterStudent) return;

            delete studentDb[pendingQrNum];

            studentDb[pendingQrNum] = {
                row: tempTargetRow,
                col: tempTargetCol,
                name: rosterStudent.name,
                sNum: rosterStudent.sNum
            };
            localStorage.setItem('student_db', JSON.stringify(studentDb));

            document.getElementById('admin-confirm-modal').classList.add('hidden');
            document.getElementById('pending-banner').classList.add('hidden');
            
            pendingQrNum = null;
            renderSeatingChart();
            isScanningPaused = false;
            forceVideoPlay();
            
            alert("優先券の登録が完了しました！");
        }

        function cancelPendingRegistration() {
            pendingQrNum = null;
            document.getElementById('pending-banner').classList.add('hidden');
            isScanningPaused = false;
        }

        function submitManualNumber() {
            const input = document.getElementById('manual-number-input');
            const num = input.value.trim();
            if (!num) {
                alert("番号を入力してください。");
                return;
            }
            handleScannedData(num);
            input.value = ''; 
        }

        function clearTicketLinks() {
            if (confirm("登録されている「すべての優先券の紐付け登録」を完全にリセットしますか？\n（名簿のお名前は消えず、全員が未登録の白席に戻ります）")) {
                studentDb = {};
                localStorage.removeItem('student_db');
                renderSeatingChart();
                cancelPendingRegistration();
                alert("すべての紐付けを解除しました！");
            }
        }

        /* --- カメラ制御＆自己診断自動リカバリーシステム --- */
        async function startCamera() {
            const video = document.getElementById('scanner-video');
            const loadingMessage = document.getElementById('camera-loading');

            loadingMessage.classList.remove('hidden');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // 互換性最優先のため、サイズ制限なしの超軽量指定
                });
                video.srcObject = videoStream;
                video.setAttribute('playsinline', true);
                await video.play();
                
                loadingMessage.classList.add('hidden');
                
                // フリーズチェックタイマーを同期
                lastVideoTime = video.currentTime;
                lastVideoTimeUpdateTime = Date.now();

                animationFrameId = requestAnimationFrame(tick);
            } catch (err) {
                console.error(err);
                loadingMessage.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation text-amber-500 text-3xl mb-2"></i>
                    <p class="text-xs text-center font-bold">カメラ起動エラー<br>利用許可が出ているか確認してください</p>
                `;
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        async function restartCamera() {
            stopCamera();
            await startCamera();
            isScanningPaused = false;
        }

        // カメラのフリーズを自動でリカバリーするバックグラウンド監視プログラム (ウォームアップ時の誤検知防止つき)
        async function checkCameraFreeze() {
            if (isRecovering) return; 

            const video = document.getElementById('scanner-video');
            
            // スキャン待ち（モーダル非表示 ＆ 配信有効状態）のときのみ
            if (video && !video.paused && !isScanningPaused && videoStream) {
                // currentTimeが前回と同一、かつ「既に再生が開始されている（0秒より先）」ときのみ判定
                if (video.currentTime === lastVideoTime && video.currentTime > 0) {
                    const frozenDuration = Date.now() - lastVideoTimeUpdateTime;
                    
                    // 5000ミリ秒（5秒）以上動きが止まった場合、自動で接続し直す
                    if (frozenDuration > 5000) {
                        isRecovering = true;
                        console.warn("映像のフリーズを自動検知しました。カメラを自動修復します。");
                        
                        await restartCamera();
                        
                        isRecovering = false;
                    }
                } else {
                    lastVideoTime = video.currentTime;
                    lastVideoTimeUpdateTime = Date.now();
                }
            } else {
                lastVideoTimeUpdateTime = Date.now();
                if (video) lastVideoTime = video.currentTime;
            }
        }

        function forceVideoPlay() {
            const video = document.getElementById('scanner-video');
            if (video && video.paused && videoStream) {
                video.play().catch(e => console.warn("再生再開エラー:", e));
            }
        }

        const canvasElement = document.createElement('canvas');
        const canvas = canvasElement.getContext('2d');

        function tick() {
            if (!isScanningPaused) {
                const video = document.getElementById('scanner-video');
                if (video && video.readyState === video.HAVE_ENOUGH_DATA) {
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        animationFrameId = requestAnimationFrame(tick);
                        return;
                    }

                    canvasElement.height = video.videoHeight;
                    canvasElement.width = video.videoWidth;
                    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                    
                    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
                    if (code) { handleScannedData(code.data); }
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }
    </script>
