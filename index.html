<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給食おかわり名簿登録システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>
    <!-- jsQR (QRコード読み取りライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col max-w-2xl mx-auto shadow-2xl bg-white pb-8">

    <!-- ヘッダー -->
    <header id="app-header" class="bg-slate-800 text-white p-4 md:p-6 sticky top-0 z-10 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-address-book text-xl md:text-2xl text-slate-300"></i>
            <div>
                <h1 class="text-lg md:text-2xl font-bold tracking-wider">優先券・名簿管理</h1>
                <p class="text-[9px] md:text-xs text-slate-400">QRスキャンまたは手動入力で名簿の登録・確認を行います</p>
            </div>
        </div>
        <span class="text-xs bg-slate-700 px-3 py-1.5 rounded-full font-bold border border-slate-600 flex items-center">
            <i class="fa-solid fa-plane-slash mr-1.5 text-amber-400"></i>オフライン専用
        </span>
    </header>

    <main class="p-4 md:p-6 space-y-5 flex-grow">

        <!-- 1. カメラ映像表示エリア (正方形) -->
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-square w-full max-w-md mx-auto flex items-center justify-center border border-slate-300 shadow-md">
            <div id="camera-loading" class="text-white text-center p-4">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-slate-400"></i>
                <p class="text-sm">カメラを起動しています...</p>
            </div>
            <div id="camera-container" class="hidden w-full h-full relative">
                <video id="scanner-video" class="w-full h-full object-cover" playsinline></video>
                <div id="scan-frame" class="absolute inset-0 border-4 border-slate-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse"></div>
            </div>
        </div>

        <!-- カメラ再起動 ＆ 手動入力エリア -->
        <div class="max-w-md mx-auto w-full space-y-4">
            <div class="text-center">
                <button onclick="restartCamera()" class="text-xs text-slate-600 hover:text-slate-800 font-bold flex items-center justify-center mx-auto space-x-1 py-1 px-3 bg-slate-200 rounded-full transition-colors">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span>📷 カメラが固まったら再起動</span>
                </button>
            </div>

            <!-- ★【新機能】出席番号・管理番号の手動入力欄 -->
            <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl shadow-sm space-y-2">
                <label class="block text-xs font-bold text-slate-600"><i class="fa-solid fa-keyboard mr-1 text-slate-500"></i> 番号を手動で入力して検索 / 登録</label>
                <div class="flex space-x-2">
                    <input type="text" id="manual-number-input" onkeydown="if(event.key === 'Enter') submitManualNumber()" placeholder="例：101（出席番号や管理番号）" class="flex-grow border border-gray-300 rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-slate-500">
                    <button onclick="submitManualNumber()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold px-5 py-2.5 rounded-xl text-xs transition-colors shadow-sm">
                        検索 / 登録
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 登録名簿一覧 -->
        <div class="space-y-3 max-w-md mx-auto w-full pt-2">
            <div class="flex justify-between items-center">
                <h3 class="text-sm font-bold text-slate-600 flex items-center"><i class="fa-solid fa-address-book mr-2"></i>登録名簿一覧</h3>
                <button onclick="clearStudentDb()" class="text-xs text-red-500 font-bold">名簿をすべて消去</button>
            </div>
            <div id="student-db-list" class="space-y-2 max-h-64 overflow-y-auto bg-slate-50 p-3 rounded-xl border border-slate-200 text-xs">
                <!-- 名簿 -->
            </div>
        </div>
    </main>

    <!-- 名前・号車入力モーダル (スキャン時、または手動入力時に起動) -->
    <div id="admin-input-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold text-gray-800 flex items-center border-b pb-2"><i class="fa-solid fa-user-plus text-slate-700 mr-2"></i>名簿登録</h3>
            <div class="bg-slate-50 p-2.5 rounded-lg text-xs">QRコード / 入力番号: <strong id="modal-qr-num" class="text-slate-800 ml-1"></strong></div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">号車</label>
                <select id="input-gousha" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
                    <option value="1号車">1号車</option>
                    <option value="2号車">2号車</option>
                    <option value="3号車">3号車</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">名前</label>
                <input type="text" id="input-name" placeholder="例：山田 太郎" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="cancelAdminInput()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">キャンセル</button>
                <button onclick="submitAdminInput()" class="flex-1 bg-slate-700 text-white font-bold py-2.5 rounded-xl text-sm">登録する</button>
            </div>
        </div>
    </div>

    <script>
        let videoStream = null;
        let animationFrameId = null;
        let isScanningPaused = false;
        let activeQrNum = null; 
        
        let studentDb = JSON.parse(localStorage.getItem('student_db')) || {};

        window.onload = function() {
            startCamera();
            renderStudentDb();
        };

        // カメラ起動
        async function startCamera() {
            const video = document.getElementById('scanner-video');
            const container = document.getElementById('camera-container');
            const loadingMessage = document.getElementById('camera-loading');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } } 
                });
                video.srcObject = videoStream;
                video.setAttribute('playsinline', true);
                await video.play();
                
                loadingMessage.classList.add('hidden');
                container.classList.remove('hidden');
                
                animationFrameId = requestAnimationFrame(tick);
            } catch (err) {
                console.error(err);
                loadingMessage.innerText = "カメラの起動に失敗しました。利用許可が出ているか確認してください。";
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        async function restartCamera() {
            const loadingMessage = document.getElementById('camera-loading');
            const container = document.getElementById('camera-container');
            loadingMessage.classList.remove('hidden');
            container.classList.add('hidden');
            
            stopCamera();
            await startCamera();
            isScanningPaused = false;
        }

        function forceVideoPlay() {
            const video = document.getElementById('scanner-video');
            if (video && video.paused && videoStream) {
                video.play().catch(e => console.warn("再生再開エラー:", e));
            }
        }

        const canvasElement = document.createElement('canvas');
        const canvas = canvasElement.getContext('2d');

        function tick() {
            if (!isScanningPaused) {
                const video = document.getElementById('scanner-video');
                if (video && video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvasElement.height = video.videoHeight;
                    canvasElement.width = video.videoWidth;
                    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                    
                    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
                    if (code) { handleScannedData(code.data); }
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }

        // スキャン（または手動入力）データの処理
        function handleScannedData(scannedData) {
            isScanningPaused = true;
            if (navigator.vibrate) { navigator.vibrate(200); }
            
            let qrNum = scannedData.trim();
            try {
                const url = new URL(scannedData);
                qrNum = url.searchParams.get('id') || url.searchParams.get('get') || scannedData.trim();
            } catch (e) {}

            activeQrNum = qrNum;
            const student = studentDb[qrNum];

            if (student) {
                // すでに登録済みの場合 ➔ 修正モーダルを開く
                openAdminInputModal(qrNum, true);
            } else {
                // 登録がない場合 ➔ 新規登録モーダルを開く
                openAdminInputModal(qrNum, false);
            }
        }

        // 手動で管理番号を入力して検索・登録する処理
        function submitManualNumber() {
            const input = document.getElementById('manual-number-input');
            const num = input.value.trim();
            if (!num) {
                alert("番号を入力してください。");
                return;
            }
            handleScannedData(num);
            input.value = ''; // 入力欄をクリア
        }

        // 入力モーダルの表示
        function openAdminInputModal(qrNum, isEdit = false) {
            document.getElementById('modal-qr-num').innerText = qrNum;
            const titleEl = document.getElementById('modal-title');
            const goushaSelect = document.getElementById('input-gousha');
            const nameInput = document.getElementById('input-name');

            if (isEdit) {
                titleEl.innerHTML = `<i class="fa-solid fa-user-pen text-slate-700 mr-2"></i>登録情報の修正`;
                goushaSelect.value = studentDb[qrNum].gousha;
                nameInput.value = studentDb[qrNum].name;
            } else {
                titleEl.innerHTML = `<i class="fa-solid fa-user-plus text-slate-700 mr-2"></i>名簿に新規登録`;
                goushaSelect.value = "1号車";
                nameInput.value = '';
            }

            const modal = document.getElementById('admin-input-modal');
            modal.classList.remove('hidden');
            nameInput.focus();
        }

        // 登録・修正を保存する処理
        function submitAdminInput() {
            const gousha = document.getElementById('input-gousha').value;
            const name = document.getElementById('input-name').value.trim();
            if (!name) { alert("名前を入力してください。"); return; }
            
            studentDb[activeQrNum] = { name: name, gousha: gousha };
            localStorage.setItem('student_db', JSON.stringify(studentDb));

            renderStudentDb();
            closeAdminInputModal();
            isScanningPaused = false;
            forceVideoPlay();
        }

        function cancelAdminInput() {
            closeAdminInputModal();
            isScanningPaused = false;
            forceVideoPlay();
        }

        function closeAdminInputModal() {
            document.getElementById('admin-input-modal').classList.add('hidden');
        }

        // 登録名簿一覧の描画
        function renderStudentDb() {
            const listEl = document.getElementById('student-db-list');
            listEl.innerHTML = '';
            const keys = Object.keys(studentDb);

            if (keys.length === 0) {
                listEl.innerHTML = `<p class="text-center py-6 text-slate-400">登録されている生徒名簿はありません</p>`;
                return;
            }

            // 番号順（昇順）にソートして表示
            keys.sort((a, b) => {
                return (parseInt(a) || 0) - (parseInt(b) || 0);
            });

            keys.forEach(qrNum => {
                const s = studentDb[qrNum];
                listEl.innerHTML += `
                    <div class="bg-white border border-slate-100 rounded-xl p-3 flex items-center justify-between shadow-sm">
                        <div class="flex items-center space-x-3">
                            <span class="bg-slate-100 text-slate-600 p-2 rounded-lg text-sm font-bold font-mono">#${qrNum}</span>
                            <div>
                                <span class="bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded text-[10px] font-bold">${s.gousha}</span>
                                <span class="font-bold text-slate-800 ml-1.5">${s.name}</span>
                            </div>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="openAdminInputModal('${qrNum}', true)" class="text-slate-600 hover:text-slate-800 hover:bg-slate-100 text-xs font-bold px-2.5 py-1 rounded border border-slate-200 bg-slate-50">
                                ✏️修正
                            </button>
                            <button onclick="deleteStudent('${qrNum}')" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        function deleteStudent(qrNum) {
            const s = studentDb[qrNum];
            if (confirm(`「${s.gousha} の ${s.name}」さんを名簿から削除しますか？`)) {
                delete studentDb[qrNum];
                localStorage.setItem('student_db', JSON.stringify(studentDb));
                renderStudentDb();
            }
        }

        function clearStudentDb() {
            if (confirm("登録されている「名簿一覧」をすべて消去しますか？")) {
                studentDb = {};
                localStorage.removeItem('student_db');
                renderStudentDb();
            }
        }
    </script>
</body>
</html>
