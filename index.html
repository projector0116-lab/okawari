<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給食おかわり登録システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>
    <!-- jsQR (QRコード読み取りライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col max-w-2xl mx-auto shadow-2xl bg-white pb-8">

    <!-- ヘッダー -->
    <header id="app-header" class="bg-emerald-700 text-white p-4 md:p-6 sticky top-0 z-10 flex justify-between items-center shadow-md transition-colors duration-300">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-school text-xl md:text-2xl"></i>
            <div>
                <h1 id="app-title" class="text-lg md:text-2xl font-bold tracking-wider">おかわり登録</h1>
                <p id="app-subtitle" class="text-[9px] md:text-xs text-emerald-200">スプレッドシートと連動して記録します</p>
            </div>
        </div>
        <button onclick="toggleAdminMode()" id="admin-toggle-btn" class="text-xs bg-emerald-800 hover:bg-emerald-900 border border-emerald-600 px-3 py-2 rounded-full font-bold transition-all flex items-center space-x-1">
            <i class="fa-solid fa-lock"></i>
            <span>管理者モードへ</span>
        </button>
    </header>

    <main class="p-4 md:p-6 space-y-4 flex-grow">
        <!-- 管理者用案内 -->
        <div id="admin-banner" class="hidden bg-slate-100 border-l-4 border-slate-700 p-3 rounded-r text-xs text-slate-800 font-bold shadow-sm">
            <i class="fa-solid fa-user-shield mr-1"></i> 【管理者モード】使用状況のリセット（復活）や登録情報の編集が可能です。
        </div>

        <!-- カメラ映像表示エリア (正方形) -->
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-square w-full max-w-md mx-auto flex items-center justify-center border border-gray-200 shadow-md">
            <div id="camera-loading" class="text-white text-center p-4">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-emerald-400"></i>
                <p class="text-sm">カメラを起動しています...</p>
            </div>
            <div id="camera-container" class="hidden w-full h-full relative">
                <video id="scanner-video" class="w-full h-full object-cover" playsinline></video>
                <div id="scan-frame" class="absolute inset-0 border-4 border-emerald-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse"></div>
            </div>
        </div>

        <!-- カメラフリーズ対策用の再起動ボタン -->
        <div class="text-center">
            <button onclick="restartCamera()" id="camera-refresh-btn" class="text-xs text-emerald-600 hover:text-emerald-800 font-bold flex items-center justify-center mx-auto space-x-1 py-1 px-3 bg-emerald-50 rounded-full transition-colors">
                <i class="fa-solid fa-arrows-rotate"></i>
                <span>📷 カメラが固まったら再起動</span>
            </button>
        </div>

        <!-- 【管理者モード用】記録一覧・登録名簿の表示 -->
        <div id="admin-log-section" class="hidden space-y-6 max-w-md mx-auto w-full">
            <!-- Googleスプレッドシート連携 -->
            <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 space-y-3 shadow-sm">
                <h3 class="text-xs font-bold text-emerald-800 flex items-center"><i class="fa-solid fa-file-excel mr-2"></i>Googleスプレッドシート連携</h3>
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-gray-500">Google Apps Script (GAS) のURL</label>
                    <input type="text" id="gas-url" class="w-full border border-gray-300 rounded p-2 text-xs outline-none">
                </div>
                <div class="flex space-x-2 pt-1">
                    <button onclick="syncStudentDbFromSheets()" id="sync-btn" class="flex-grow bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded text-[10px] shadow-sm flex items-center justify-center">
                        <i class="fa-solid fa-arrows-rotate mr-1"></i> スプレッドシートから名簿を同期
                    </button>
                    <button onclick="saveGasUrl()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-2 px-3 rounded text-[10px]">URLを保存</button>
                </div>
            </div>

            <!-- おかわり記録 (個別削除に対応) -->
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-gray-600 flex items-center"><i class="fa-solid fa-list-ul mr-2"></i>おかわり記録一覧</h3>
                    <div class="space-x-2">
                        <button onclick="resetAllUsage()" class="text-[10px] bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 font-bold px-2 py-1 rounded-lg transition-colors">
                            全員の使用状況を一括リセット
                        </button>
                        <button onclick="clearAdminLogs()" class="text-xs text-red-500 font-bold">記録をすべて消去</button>
                    </div>
                </div>
                <div id="admin-log-list" class="space-y-2 max-h-48 overflow-y-auto bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs"></div>
            </div>

            <!-- 登録名簿一覧 (個別削除対応) -->
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-gray-600 flex items-center"><i class="fa-solid fa-address-book mr-2"></i>登録名簿一覧</h3>
                    <button onclick="clearStudentDb()" class="text-xs text-red-500 font-bold">名簿をすべて消去</button>
                </div>
                <div id="student-db-list" class="space-y-2 max-h-48 overflow-y-auto bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs"></div>
            </div>
        </div>
    </main>

    <!-- 【一般モード】中央スキャン結果＆使用確認モーダル -->
    <div id="student-scan-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div id="student-modal-card" class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl text-center transform scale-95 transition-all duration-200">
            <div id="student-modal-content"></div>
        </div>
    </div>

    <!-- 【パスワード入力モーダル】 (8桁制限) -->
    <div id="pw-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-800 flex items-center border-b pb-2"><i class="fa-solid fa-key text-emerald-600 mr-2"></i>管理者認証</h3>
            <p class="text-xs text-gray-500">管理者モードに入るには、8桁のパスワードを入力してください。</p>
            <div>
                <input type="password" id="pw-input" maxlength="8" placeholder="8桁のパスワードを入力" class="w-full border border-gray-300 rounded-lg p-2.5 text-center text-lg tracking-widest font-mono outline-none">
                <p id="pw-error" class="hidden text-xs text-red-500 mt-1.5 font-semibold text-center">※パスワードが違います</p>
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="closePasswordModal()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">キャンセル</button>
                <button onclick="verifyPassword()" class="flex-1 bg-emerald-600 text-white font-bold py-2.5 rounded-xl text-sm">認証</button>
            </div>
        </div>
    </div>

    <!-- 【管理者モード専用】スキャン成功時・状態操作カード -->
    <div id="admin-result-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div id="admin-result-card" class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl text-center transform scale-95 transition-all duration-200">
            <p class="text-xs text-slate-600 mb-1 font-bold">チケットの読み取り結果</p>
            <div class="my-3">
                <span class="bg-slate-200 text-slate-700 px-2 py-1 rounded text-xs font-bold" id="admin-result-gousha"></span>
                <span class="font-bold text-lg md:text-xl text-gray-800 ml-2" id="admin-result-name"></span>
            </div>
            
            <!-- 使用状況表示＆リセットボタン -->
            <div id="admin-status-area" class="my-4 p-4 bg-slate-50 border border-slate-100 rounded-xl space-y-3 shadow-inner"></div>

            <div class="flex justify-center space-x-3 mt-4 border-t pt-3">
                <button onclick="triggerEditFromAdminResult()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold py-2.5 rounded-xl transition-colors">登録情報を修正</button>
                <button onclick="closeAdminResult()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold py-2.5 rounded-xl transition-colors">閉じる</button>
            </div>
        </div>
    </div>

    <!-- 【管理者用】名前・号車入力モーダル -->
    <div id="admin-input-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold text-gray-800 flex items-center border-b pb-2"><i class="fa-solid fa-user-plus text-slate-700 mr-2"></i>名簿登録</h3>
            <div class="bg-slate-50 p-2.5 rounded-lg text-xs">QRコード番号: <strong id="modal-qr-num" class="text-slate-800 ml-1"></strong></div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">号車</label>
                <!-- 選択肢を3号車までに制限 -->
                <select id="input-gousha" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
                    <option value="1号車">1号車</option>
                    <option value="2号車">2号車</option>
                    <option value="3号車">3号車</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">名前</label>
                <input type="text" id="input-name" placeholder="例：山田 太郎" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="cancelAdminInput()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">キャンセル</button>
                <button onclick="submitAdminInput()" class="flex-1 bg-slate-700 text-white font-bold py-2.5 rounded-xl text-sm">登録する</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "02050205";
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbzL_Iv9GX0Gom28aey7dnujgBSLp8SZS23KgfQYwAJ8dqdtF0VI2wwSdfZNnLAU9RyJ/exec";

        let videoStream = null;
        let animationFrameId = null;
        let isScanningPaused = false;
        let isAdminMode = false; 
        let activeQrNum = null; 
        
        let studentDb = JSON.parse(localStorage.getItem('student_db')) || {};
        let adminLogs = JSON.parse(localStorage.getItem('student_okawari_logs')) || [];
        let usedTickets = JSON.parse(localStorage.getItem('used_tickets')) || {};

        window.onload = function() {
            startCamera();
            renderAdminLogs();
            renderStudentDb();
            const savedUrl = localStorage.getItem('gas_url');
            if (savedUrl) {
                document.getElementById('gas-url').value = savedUrl;
            } else {
                document.getElementById('gas-url').value = DEFAULT_GAS_URL;
                localStorage.setItem('gas_url', DEFAULT_GAS_URL);
            }
        };

        function toggleAdminMode() {
            if (!isAdminMode) {
                openPasswordModal();
            } else {
                setAdminModeState(false);
            }
        }

        function openPasswordModal() {
            isScanningPaused = true;
            document.getElementById('pw-input').value = '';
            document.getElementById('pw-error').classList.add('hidden');
            document.getElementById('pw-modal').classList.remove('hidden');
            document.getElementById('pw-input').focus();
        }

        function closePasswordModal() {
            document.getElementById('pw-modal').classList.add('hidden');
            isScanningPaused = false;
            forceVideoPlay();
        }

        function verifyPassword() {
            const enteredPw = document.getElementById('pw-input').value;
            const errorLabel = document.getElementById('pw-error');
            if (enteredPw === ADMIN_PASSWORD) {
                document.getElementById('pw-modal').classList.add('hidden');
                setAdminModeState(true);
            } else {
                errorLabel.classList.remove('hidden');
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        }

        function setAdminModeState(state) {
            isAdminMode = state;
            const header = document.getElementById('app-header');
            const subTitle = document.getElementById('app-subtitle');
            const toggleBtn = document.getElementById('admin-toggle-btn');
            const adminBanner = document.getElementById('admin-banner');
            const adminSection = document.getElementById('admin-log-section');
            const scanFrame = document.getElementById('scan-frame');
            const refreshBtn = document.getElementById('camera-refresh-btn');

            closeStudentScanModal();
            closeAdminResult();
            isScanningPaused = false;

            if (isAdminMode) {
                header.className = "bg-slate-700 text-white p-4 md:p-6 sticky top-0 z-10 flex justify-between items-center shadow-md transition-colors duration-300";
                subTitle.innerText = "管理用おかわり記録スキャナー";
                subTitle.className = "text-[9px] md:text-xs text-slate-300";
                toggleBtn.className = "text-xs bg-slate-800 hover:bg-slate-900 border border-slate-600 px-3 py-2 rounded-full font-bold transition-all flex items-center space-x-1";
                toggleBtn.innerHTML = `<i class="fa-solid fa-unlock"></i><span>一般モードへ</span>`;
                scanFrame.className = "absolute inset-0 border-4 border-emerald-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse";
                adminBanner.classList.remove('hidden');
                adminSection.classList.remove('hidden');
                refreshBtn.className = "text-xs text-slate-600 hover:text-slate-800 font-bold flex items-center justify-center mx-auto space-x-1 py-1 px-3 bg-slate-100 rounded-full transition-colors";
            } else {
                header.className = "bg-emerald-700 text-white p-4 md:p-6 sticky top-0 z-10 flex justify-between items-center shadow-md transition-colors duration-300";
                subTitle.innerText = "スプレッドシートと連動して記録します";
                subTitle.className = "text-[9px] md:text-xs text-emerald-200";
                toggleBtn.className = "text-xs bg-emerald-800 hover:bg-emerald-900 border border-emerald-600 px-3 py-2 rounded-full font-bold transition-all flex items-center space-x-1";
                toggleBtn.innerHTML = `<i class="fa-solid fa-lock"></i><span>管理者モードへ</span>`;
                scanFrame.className = "absolute inset-0 border-4 border-emerald-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse";
                adminBanner.classList.add('hidden');
                adminSection.classList.add('hidden');
                refreshBtn.className = "text-xs text-emerald-600 hover:text-emerald-800 font-bold flex items-center justify-center mx-auto space-x-1 py-1 px-3 bg-emerald-50 rounded-full transition-colors";
            }
            forceVideoPlay();
        }

        async function startCamera() {
            const video = document.getElementById('scanner-video');
            const container = document.getElementById('camera-container');
            const loadingMessage = document.getElementById('camera-loading');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } } 
                });
                video.srcObject = videoStream;
                video.setAttribute('playsinline', true);
                await video.play();
                
                loadingMessage.classList.add('hidden');
                container.classList.remove('hidden');
                
                animationFrameId = requestAnimationFrame(tick);
            } catch (err) {
                console.error(err);
                loadingMessage.innerText = "カメラの起動に失敗しました。利用許可が出ているか確認してください。";
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        async function restartCamera() {
            const loadingMessage = document.getElementById('camera-loading');
            const container = document.getElementById('camera-container');
            loadingMessage.classList.remove('hidden');
            container.classList.add('hidden');
            
            stopCamera();
            await startCamera();
            isScanningPaused = false;
        }

        function forceVideoPlay() {
            const video = document.getElementById('scanner-video');
            if (video && video.paused && videoStream) {
                video.play().catch(e => console.warn("再生再開エラー:", e));
            }
        }

        const canvasElement = document.createElement('canvas');
        const canvas = canvasElement.getContext('2d');

        function tick() {
            if (!isScanningPaused) {
                const video = document.getElementById('scanner-video');
                if (video && video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvasElement.height = video.videoHeight;
                    canvasElement.width = video.videoWidth;
                    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                    
                    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
                    if (code) { handleScannedData(code.data); }
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }

        function handleScannedData(scannedData) {
            isScanningPaused = true;
            if (navigator.vibrate) { navigator.vibrate(200); }
            let qrNum = scannedData.trim();
            try {
                const url = new URL(scannedData);
                qrNum = url.searchParams.get('id') || url.searchParams.get('get') || scannedData.trim();
            } catch (e) {}
            activeQrNum = qrNum;
            const student = studentDb[qrNum];

            if (isAdminMode) {
                if (student) {
                    showAdminResult(student.name, student.gousha, qrNum);
                } else {
                    openAdminInputModal(qrNum, false);
                }
            } else {
                openStudentScanModal(qrNum, student);
            }
        }

        /* --- 一般モード用：中央ポップアップモーダル制御 --- */
        function openStudentScanModal(qrNum, student) {
            const modal = document.getElementById('student-scan-modal');
            const content = document.getElementById('student-modal-content');
            const card = document.getElementById('student-modal-card');
            
            card.className = "bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl text-center transform transition-all duration-200";

            if (!student) {
                content.innerHTML = `
                    <i class="fa-solid fa-circle-exclamation text-rose-500 text-5xl mb-2"></i>
                    <h3 class="font-bold text-lg text-rose-800">登録がありません</h3>
                    <p class="text-xs text-rose-700 bg-rose-50 p-2 rounded max-w-xs mx-auto border border-rose-100 font-mono mb-2">QR番号: ${qrNum}</p>
                    <p class="text-xs text-rose-600 font-bold leading-relaxed">お名前がまだ登録されていません。<br>級長（管理者）に登録してもらってください。</p>
                    <div class="pt-2">
                        <button onclick="closeStudentScanModal()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all active:scale-95">
                            とじる
                        </button>
                    </div>
                `;
            } else if (usedTickets[qrNum]) {
                content.innerHTML = `
                    <i class="fa-solid fa-circle-minus text-amber-500 text-5xl mb-2"></i>
                    <h3 class="font-bold text-lg text-amber-800">使用済みです</h3>
                    <div class="my-3 bg-amber-50/50 p-3 rounded-xl border border-amber-100">
                        <span class="bg-amber-200 text-amber-800 px-2.5 py-0.5 rounded text-[10px] font-bold">${student.gousha}</span>
                        <span class="font-bold text-sm text-gray-800 ml-1.5">${student.name} さん</span>
                    </div>
                    <p class="text-xs text-amber-700 font-bold leading-relaxed">このチケットは今日すでにおかわりしています。<br><span class="text-[10px] text-amber-600 font-medium">級長（管理者）にチケットを返却してください。</span></p>
                    <div class="pt-2">
                        <button onclick="closeStudentScanModal()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl text-sm transition-all active:scale-95">
                            とじる
                        </button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <i class="fa-solid fa-circle-question text-emerald-600 text-5xl mb-2 animate-bounce"></i>
                    <h3 class="font-bold text-lg text-gray-800 font-black">おかわりチケットを使用しますか？</h3>
                    <div class="my-3 bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                        <span class="bg-emerald-200 text-emerald-800 px-2.5 py-0.5 rounded text-[10px] font-bold">${student.gousha}</span>
                        <span class="font-bold text-base text-gray-800 ml-1.5">${student.name} さん</span>
                    </div>
                    <div class="flex space-x-3 pt-2">
                        <button onclick="closeStudentScanModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 rounded-xl text-sm transition-all active:scale-95">
                            いいえ
                        </button>
                        <button onclick="confirmRefillUse('${qrNum}', '${student.name}', '${student.gousha}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all active:scale-95 shadow-md">
                            はい、使用する
                        </button>
                    </div>
                `;
            }

            modal.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-95'), 10);
            document.getElementById('scan-frame').className = "absolute inset-0 border-4 border-amber-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80";
        }

        // 使用を確定して打刻する処理
        function confirmRefillUse(qrNum, name, gousha) {
            recordRefill(qrNum, name, gousha);
            
            usedTickets[qrNum] = true;
            localStorage.setItem('used_tickets', JSON.stringify(usedTickets));
            
            closeStudentScanModal();
            alert(`おかわり完了！\n${gousha} の ${name} さんの記録をスプレッドシートに保存しました。`);
        }

        function closeStudentScanModal() {
            document.getElementById('student-scan-modal').classList.add('hidden');
            document.getElementById('student-modal-card').classList.add('scale-95');
            const frameColor = isAdminMode ? "border-slate-500" : "border-emerald-500";
            document.getElementById('scan-frame').className = `absolute inset-0 border-4 ${frameColor} m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse`;
            isScanningPaused = false;
            forceVideoPlay();
        }

        function recordRefill(qrNum, name, gousha) {
            const timeFullStr = new Date().toLocaleString('ja-JP');
            const newLog = {
                id: Date.now(),
                qrNum: qrNum,
                gousha: gousha,
                name: name,
                time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
            };
            adminLogs.unshift(newLog);
            localStorage.setItem('student_okawari_logs', JSON.stringify(adminLogs));
            renderAdminLogs();

            const gasUrl = localStorage.getItem('gas_url');
            if (gasUrl) {
                const sendUrl = `${gasUrl}?action=addLog&gousha=${encodeURIComponent(gousha)}&name=${encodeURIComponent(name)}&qrNum=${encodeURIComponent(qrNum)}&time=${encodeURIComponent(timeFullStr)}`;
                fetch(sendUrl, { mode: 'no-cors' })
                    .then(() => console.log("Google Sheetsへログを送信しました。"))
                    .catch(err => console.error("Google Sheets送信エラー:", err));
            }
        }

        function saveGasUrl() {
            const urlInput = document.getElementById('gas-url').value.trim();
            localStorage.setItem('gas_url', urlInput);
            alert("GASのURLを端末に保存しました。");
        }

        function syncStudentDbFromSheets() {
            const gasUrl = document.getElementById('gas-url').value.trim();
            if (!gasUrl) { alert("GASのURLが入力されていません。"); return; }
            const btn = document.getElementById('sync-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> 同期中...`;
            btn.disabled = true;
            const syncUrl = `${gasUrl}?action=getStudents`;
            fetch(syncUrl)
                .then(res => res.json())
                .then(data => {
                    studentDb = data;
                    localStorage.setItem('student_db', JSON.stringify(studentDb));
                    renderStudentDb();
                    alert("スプレッドシートから名簿を同期しました！");
                })
                .catch(err => {
                    console.error("同期失敗:", err);
                    alert("スプレッドシートとの同期に失敗しました。\n・URLに間違いがないか\n・GASが正しく全員に公開デプロイされているか確認してください。");
                })
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        }

        // 管理者画面用のステータス表示（リセットボタン）
        function showAdminResult(name, gousha, qrNum) {
            document.getElementById('admin-result-name').innerText = name + " さん";
            document.getElementById('admin-result-gousha').innerText = gousha;

            const isUsed = usedTickets[qrNum];
            const statusArea = document.getElementById('admin-status-area');
            
            if (isUsed) {
                statusArea.innerHTML = `
                    <p class="text-xs text-amber-600 font-bold flex items-center justify-center">
                        <i class="fa-solid fa-circle-minus mr-1"></i> 現在：使用済み 🔴 (再スキャン不可)
                    </p>
                    <button onclick="resetSingleTicket('${qrNum}')" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-2.5 rounded-lg transition-transform active:scale-95">
                        使用状況をクリアして【未使用】に戻す
                    </button>
                `;
            } else {
                statusArea.innerHTML = `
                    <p class="text-xs text-emerald-600 font-bold flex items-center justify-center">
                        <i class="fa-solid fa-circle-check mr-1"></i> 現在：未使用 🟢 (スキャン可能)
                    </p>
                    <button onclick="forceUseSingleTicket('${qrNum}')" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 text-xs py-2.5 rounded-lg transition-transform active:scale-95">
                        使用済みに設定する
                    </button>
                `;
            }

            const modal = document.getElementById('admin-result-modal');
            const card = document.getElementById('admin-result-card');
            modal.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-95'), 10);
            document.getElementById('scan-frame').className = "absolute inset-0 border-4 border-slate-500 m-12 md:m-16 rounded-lg pointer-events-none opacity-80";
        }

        function closeAdminResult() {
            document.getElementById('admin-result-modal').classList.add('hidden');
            document.getElementById('admin-result-card').classList.add('scale-95');
            const frameColor = isAdminMode ? "border-slate-500" : "border-emerald-500";
            document.getElementById('scan-frame').className = `absolute inset-0 border-4 ${frameColor} m-12 md:m-16 rounded-lg pointer-events-none opacity-80 animate-pulse`;
            isScanningPaused = false;
            forceVideoPlay();
        }

        // 1人ずつ使用状況をリセットして未使用に戻す
        function resetSingleTicket(qrNum) {
            usedTickets[qrNum] = false;
            localStorage.setItem('used_tickets', JSON.stringify(usedTickets));
            const student = studentDb[qrNum];
            showAdminResult(student.name, student.gousha, qrNum); 
            alert(`No.${qrNum} のおかわり使用状況を【未使用】に戻しました。`);
        }

        // 個別使用済み設定
        function forceUseSingleTicket(qrNum) {
            usedTickets[qrNum] = true;
            localStorage.setItem('used_tickets', JSON.stringify(usedTickets));
            const student = studentDb[qrNum];
            showAdminResult(student.name, student.gousha, qrNum);
            alert(`No.${qrNum} を【使用済み】に設定しました。`);
        }

        // 全員リセット
        function resetAllUsage() {
            if (confirm("全員の使用状況をリセットし、すべてのチケットを【未使用】に戻しますか？\n（次の日の給食の準備などに便利です）")) {
                usedTickets = {};
                localStorage.removeItem('used_tickets');
                alert("全員の使用状況を【未使用】にリセットしました！");
                if (activeQrNum && studentDb[activeQrNum]) {
                    const student = studentDb[activeQrNum];
                    showAdminResult(student.name, student.gousha, activeQrNum);
                }
            }
        }

        function triggerEditFromAdminResult() {
            document.getElementById('admin-result-modal').classList.add('hidden');
            openAdminInputModal(activeQrNum, true); 
        }

        function openAdminInputModal(qrNum, isEdit = false) {
            document.getElementById('modal-qr-num').innerText = qrNum;
            const titleEl = document.getElementById('modal-title');
            const goushaSelect = document.getElementById('input-gousha');
            const nameInput = document.getElementById('input-name');
            if (isEdit) {
                titleEl.innerHTML = `<i class="fa-solid fa-user-pen text-slate-700 mr-2"></i>登録情報の修正`;
                goushaSelect.value = studentDb[qrNum].gousha;
                nameInput.value = studentDb[qrNum].name;
            } else {
                titleEl.innerHTML = `<i class="fa-solid fa-user-plus text-slate-700 mr-2"></i>名簿に新規登録`;
                goushaSelect.value = "1号車";
                nameInput.value = '';
            }
            const modal = document.getElementById('admin-input-modal');
            modal.classList.remove('hidden');
            nameInput.focus();
        }

        function submitAdminInput() {
            const gousha = document.getElementById('input-gousha').value;
            const name = document.getElementById('input-name').value.trim();
            if (!name) { alert("名前を入力してください。"); return; }
            
            // 名簿に保存
            studentDb[activeQrNum] = { name: name, gousha: gousha };
            localStorage.setItem('student_db', JSON.stringify(studentDb));

            // 新規登録・上書き時に自動で使用ロックをクリア
            usedTickets[activeQrNum] = false;
            localStorage.setItem('used_tickets', JSON.stringify(usedTickets));

            renderStudentDb();
            closeAdminInputModal();
            isScanningPaused = false;
        }

        function cancelAdminInput() {
            closeAdminInputModal();
            isScanningPaused = false;
        }

        function closeAdminInputModal() {
            document.getElementById('admin-input-modal').classList.add('hidden');
        }

        /* --- 一覧（履歴・名簿）の描画 & 個別削除対応 --- */
        function renderAdminLogs() {
            const listEl = document.getElementById('admin-log-list');
            listEl.innerHTML = '';
            if (adminLogs.length === 0) {
                listEl.innerHTML = `<p class="text-center py-6 text-gray-400">現在、おかわりした記録はありません</p>`;
                return;
            }
            adminLogs.forEach(log => {
                listEl.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-xl p-3 flex items-center justify-between shadow-sm">
                        <div class="flex items-center space-x-3">
                            <span class="bg-emerald-50 text-emerald-700 p-2 rounded-lg text-sm font-bold">
                                <i class="fa-solid fa-circle-check"></i>
                            </span>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded text-[10px] font-bold">${log.gousha}</span>
                                    <span class="font-bold text-gray-800">${log.name}</span>
                                </div>
                                <p class="text-[9px] text-gray-400 mt-0.5">QR: ${log.qrNum} のおかわりを記録しました</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-[9px] text-gray-400 font-mono">${log.time}</span>
                            <button onclick="deleteSingleLog(${log.id})" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        // 個別のおかわり記録（履歴）を消去する処理
        function deleteSingleLog(logId) {
            const logIndex = adminLogs.findIndex(log => log.id === logId);
            if (logIndex !== -1) {
                const log = adminLogs[logIndex];
                if (confirm(`「${log.gousha} の ${log.name}」さんのこのおかわり記録を削除しますか？`)) {
                    adminLogs.splice(logIndex, 1);
                    localStorage.setItem('student_okawari_logs', JSON.stringify(adminLogs));
                    renderAdminLogs();
                }
            }
        }

        function renderStudentDb() {
            const listEl = document.getElementById('student-db-list');
            listEl.innerHTML = '';
            const keys = Object.keys(studentDb);
            if (keys.length === 0) {
                listEl.innerHTML = `<p class="text-center py-6 text-gray-400">登録されている生徒名簿はありません</p>`;
                return;
            }
            keys.forEach(qrNum => {
                const s = studentDb[qrNum];
                listEl.innerHTML += `<div class="bg-white border border-gray-100 rounded-xl p-3 flex items-center justify-between shadow-sm"><div class="flex items-center space-x-3"><span class="bg-slate-100 text-slate-600 p-2 rounded-lg text-sm font-bold font-mono">#${qrNum}</span><div><span class="bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded text-[10px] font-bold">${s.gousha}</span><span class="font-bold text-gray-800 ml-1.5">${s.name}</span></div></div><button onclick="deleteStudent('${qrNum}')" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1"><i class="fa-solid fa-trash-can"></i></button></div>`;
            });
        }

        function deleteStudent(qrNum) {
            const s = studentDb[qrNum];
            if (confirm(`「${s.gousha} の ${s.name}」さんを名簿から削除しますか？`)) {
                delete studentDb[qrNum];
                localStorage.setItem('student_db', JSON.stringify(studentDb));
                renderStudentDb();
            }
        }

        function clearAdminLogs() {
            if (confirm("これまでの「おかわり記録一覧」をすべて消去しますか？")) {
                adminLogs = [];
                localStorage.removeItem('student_okawari_logs');
                renderAdminLogs();
            }
        }

        function clearStudentDb() {
            if (confirm("登録されている「名簿一覧」をすべて消去しますか？")) {
                studentDb = {};
                localStorage.removeItem('student_db');
                renderStudentDb();
            }
        }
    </script>
</body>
</html>
